<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Purpose Decision Atlas v6 — UI refactor preview</title>
<style>
__CSS__
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <section class="purpose-card" aria-live="polite">
      <div class="purpose-copy">
        <div class="eyebrow">Purpose Decision Atlas · v6 UI refactor</div>
        <div class="purpose-line"><h1 id="currentPurpose">—</h1><span id="statusBadge" class="pill">—</span></div>
        <p id="decisionCopy">—</p>
        <div class="meta-row"><span id="eventProgress" class="pill info">t0/40</span><span id="nextOwner" class="pill warn">次に: —</span><span id="lastEvent" class="pill info">初期投影</span></div>
      </div>
      <div id="opsQueue" aria-label="記録済みアクション"></div>
    </section>

    <nav class="commandbar" aria-label="表示・再生コントロール">
      <div class="segmented" role="tablist" aria-label="表示モード">
        <button type="button" data-mode="purpose" role="tab" aria-selected="true">目的</button>
        <button type="button" data-mode="responsibility" role="tab" aria-selected="false">責務</button>
        <button type="button" data-mode="focus" role="tab" aria-selected="false">選択経路</button>
      </div>
      <div class="transport">
        <button id="resetBtn" type="button" title="reset" aria-label="最初へ">↺</button>
        <button id="prevBtn" type="button" title="previous" aria-label="前のイベント">‹</button>
        <button id="stepBtn" class="primary" type="button">Step</button>
        <button id="playBtn" type="button" title="play" aria-label="再生">▶</button>
      </div>
      <div class="zoom-controls">
        <button id="fitBtn" type="button" title="fit" aria-label="全体表示">◎</button>
        <span class="progress" id="zoomLabel">100%</span>
        <button id="zoomOut" type="button" aria-label="縮小">−</button>
        <button id="zoomIn" type="button" aria-label="拡大">＋</button>
      </div>
    </nav>
  </header>

  <main class="workspace">
    <section class="stage" id="stage" aria-label="目的と責務の地図">
      <canvas id="atlasScene" aria-hidden="true"></canvas>
      <canvas id="atlasOverlay" tabindex="0" role="application" aria-label="ドラッグで移動、ホイールで拡大縮小、nodeをクリックして詳細を表示"></canvas>
      <div class="stage-hud">
        <span class="hud-chip" id="modeCopy">目的距離</span>
        <span class="hud-chip">左上 = meta</span>
        <span class="hud-chip">外周 = 再帰責務</span>
        <span class="hud-chip" id="renderState">cache 0</span>
        <span class="actor-legend" aria-label="責務カテゴリ">
          <span class="hud-chip actor-chip" style="color:#7fb0ff"><i class="actor-dot"></i>CEO</span>
          <span class="hud-chip actor-chip" style="color:#eaa6ff"><i class="actor-dot"></i>CPO</span>
          <span class="hud-chip actor-chip" style="color:#9d8cff"><i class="actor-dot"></i>CTO</span>
          <span class="hud-chip actor-chip" style="color:#7de6ff"><i class="actor-dot"></i>COO</span>
          <span class="hud-chip actor-chip" style="color:#ffd166"><i class="actor-dot"></i>CFO</span>
          <span class="hud-chip actor-chip" style="color:#ff8fb0"><i class="actor-dot"></i>REVIEW</span>
          <span class="hud-chip actor-chip" style="color:#8df0bd"><i class="actor-dot"></i>OPS</span>
        </span>
      </div>
    </section>

    <aside class="inspector" id="tip" aria-live="polite"></aside>
  </main>

  <footer class="timeline">
    <div class="timeline-copy"><h3>Timeline replay</h3><small>v5の40件JSONLを維持し、UI層だけを再構成。</small></div>
    <div class="ticks" id="ticks" aria-label="40イベントのタイムライン"></div>
    <small id="railSummary">—</small>
  </footer>
</div>
<div class="toast" id="toast"></div>
<div class="machine" aria-hidden="true">
  <span id="visibleNodes"></span><span id="visibleEdges"></span><span id="guardText"></span>
  <span id="opsState"></span><span id="responsibilityState"></span>
</div>
<script>
(function () {
__CORE__
__RENDERER__
})();
</script>
</body>
</html>
