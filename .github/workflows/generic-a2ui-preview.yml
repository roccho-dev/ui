name: Generic A2UI Preview

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/a2ui-shell-builder.mjs"
      - "src/index.mjs"
      - "fixtures/generic-a2ui-*.json"
      - "fixtures/generic-a2ui-*.jsonl"
      - "scripts/build-generic-a2ui-preview.mjs"
      - "tests/check-generic-a2ui-shell-builder.mjs"
      - "package.json"
      - "flake.nix"
      - ".github/workflows/generic-a2ui-preview.yml"
  push:
    branches:
      - "implementation/**"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  preview:
    name: Build Generic A2UI preview artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check builder syntax
        run: |
          node --check src/a2ui-shell-builder.mjs
          node --check scripts/build-generic-a2ui-preview.mjs
          node --check tests/check-generic-a2ui-shell-builder.mjs

      - name: Run builder tests
        run: node tests/check-generic-a2ui-shell-builder.mjs

      - name: Build preview artifact
        run: |
          rm -rf generic-a2ui-preview
          node scripts/build-generic-a2ui-preview.mjs generic-a2ui-preview
          test -s generic-a2ui-preview/shell/index.html
          test -s generic-a2ui-preview/preview-a/index.html
          test -s generic-a2ui-preview/preview-b/index.html
          test -s generic-a2ui-preview/verification-receipt.json
          grep -q '"proofKind": "jsonl-to-html"' generic-a2ui-preview/verification-receipt.json
          grep -q '"sourceJsonlDigests"' generic-a2ui-preview/verification-receipt.json
          grep -q 'generatedArtifactsAreAuthority' generic-a2ui-preview/verification-receipt.json
          find generic-a2ui-preview -type f | sort

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: generic-a2ui-preview
          path: generic-a2ui-preview/
          if-no-files-found: error
