name: Governance package validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - proposals

permissions:
  contents: read

jobs:
  gov-package-validation:
    name: validate UI package response evidence
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout UI
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout governance checks
        uses: actions/checkout@v4
        with:
          repository: roccho-dev/governance
          ref: proposals
          path: governance-export
          persist-credentials: false

      - name: Run exported package checks
        run: |
          PYTHONPATH=governance-export/tools python3 governance-export/tools/check-package-export.py check \
            --responses packages/ui-claims/package-responses.v1.jsonl \
            --report gov-package-validation-report.json

      - name: Run UI package evidence checks
        run: node tests/check-ui-package-evidence.mjs

      - name: Upload UI package evidence
        uses: actions/upload-artifact@v4
        with:
          name: ui-package-evidence
          path: |
            packages/ui-claims/package-responses.v1.jsonl
            packages/ui-projection-evidence/projection-evidence.v1.json
            packages/ui-projection-evidence/artifact-boundary-proof.v1.json
            packages/ui-receipts/receipt.v1.json
            packages/ui-receipts/residuals.v1.jsonl
            packages/ui-governance-check-adoption/gov-package-validation.intent.v1.json
            gov-package-validation-report.json
          if-no-files-found: error
