name: Purpose Atlas preview artifact

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build A2UI preview HTML
        run: nix build --print-build-logs .#purpose-atlas-preview-html

      - name: Pack preview artifact
        run: |
          mkdir -p purpose-atlas-preview-artifact
          cp -R result/dist purpose-atlas-preview-artifact/dist
          cp tests/fixtures/purpose-atlas/atlas-data.json purpose-atlas-preview-artifact/atlas-data.json
          cp tests/fixtures/purpose-atlas/surface.v0.9.jsonl purpose-atlas-preview-artifact/source.surface.v0.9.jsonl

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: purpose-atlas-approved-preview
          path: purpose-atlas-preview-artifact
          if-no-files-found: error

      - name: Verify preview artifact
        run: node tests/check-purpose-atlas-upload-artifact.mjs purpose-atlas-preview-artifact
