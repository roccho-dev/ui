name: A2UI adapter artifacts

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  adapter-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Japanese screenshot fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f
      - run: node packages/a2ui-adapter-artifacts/scripts/build.mjs
        env:
          ADAPTER_ARTIFACT_OUT: adapter-result
      - name: Retire false-positive purpose adapter artifact from upload surface
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const retiredName = 'purpose-adapter-artifact';
          const retiredPath = 'adapter-result/purpose-adapter-artifact';
          const indexPath = 'adapter-result/adapter-artifact-index.json';
          if (fs.existsSync(retiredPath)) fs.renameSync(retiredPath, 'adapter-result/.retired-purpose-adapter-artifact');
          const index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
          const retired = {
            name: retiredName,
            reason: 'false-positive-placeholder-preview',
            replacement: 'purpose-atlas-preview'
          };
          index.artifacts = (index.artifacts || []).filter((item) => item.name !== retired.name);
          index.retiredArtifacts = [...(index.retiredArtifacts || []), retired];
          index.allPresent = index.artifacts.every((item) => item.files > 0);
          fs.writeFileSync(indexPath, JSON.stringify(index, null, 2) + '\n');
          NODE
      - run: node packages/a2ui-adapter-artifacts/scripts/build-geomap-proof.mjs
        env:
          GEOMAP_ARTIFACT_OUT: adapter-result/property-map-geo-artifact
      - run: node packages/a2ui-adapter-artifacts/scripts/build-geomap-zip-parity.mjs
        env:
          GEOMAP_ZIP_PARITY_ARTIFACT_OUT: adapter-result/property-map-zip-parity-artifact
          GEOMAP_ZIP_PARITY_RENDER: "1"
          GEOMAP_ZIP_PARITY_INTERACTION: "1"
      - run: node packages/a2ui-adapter-artifacts/scripts/build-geomap-runtime-hardening.mjs
        env:
          GEOMAP_ARTIFACT_OUT: adapter-result/property-map-geo-runtime-hardening-artifact
      - run: node packages/a2ui-adapter-artifacts/scripts/check-geomap-final-gate.mjs
        env:
          GEOMAP_ZIP_PARITY_ARTIFACT_OUT: adapter-result/property-map-zip-parity-artifact
          GEOMAP_RUNTIME_ARTIFACT_OUT: adapter-result/property-map-geo-runtime-hardening-artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-adapter-artifact
          path: adapter-result/live-adapter-artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-map-geo-artifact
          path: adapter-result/property-map-geo-artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-map-zip-parity-artifact
          path: adapter-result/property-map-zip-parity-artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-map-geo-runtime-hardening-artifact
          path: adapter-result/property-map-geo-runtime-hardening-artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adapter-artifact-index
          path: adapter-result/adapter-artifact-index.json
