name: README artifact exporter

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - proposals

permissions:
  contents: read

jobs:
  export:
    name: build and upload README artifact packet
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build README artifact packet
        run: nix build --print-build-logs .#readme-artifact

      - name: Check README artifact packet
        run: |
          set -euo pipefail
          test -s result/README.md
          test -s result/manifest.json
          test -s result/sources.jsonl
          test -s result/receipt.json

      - name: Upload README artifact packet
        uses: actions/upload-artifact@v4
        with:
          name: ui-readme-artifact
          path: |
            result/README.md
            result/manifest.json
            result/sources.jsonl
            result/receipt.json
          if-no-files-found: error

  export-purpose-atlas-preview-html:
    name: build and upload Purpose Atlas preview HTML
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Purpose Atlas preview HTML
        run: nix build --print-build-logs .#purpose-atlas-preview-html

      - name: Check Purpose Atlas preview HTML
        run: |
          set -euo pipefail
          test -s result/dist/index.html
          test -s result/dist/purpose-atlas-v6-a2ui-ui-refactor.preview.html
          test -s result/dist/a2ui/purpose-atlas.surface.jsonl

      - name: Upload Purpose Atlas preview HTML
        uses: actions/upload-artifact@v4
        with:
          name: ui-purpose-atlas-preview-html
          path: result/dist/**
          if-no-files-found: error
