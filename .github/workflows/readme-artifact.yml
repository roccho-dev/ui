name: README artifact exporter

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - proposals

permissions:
  contents: read

jobs:
  export:
    name: build and upload README artifact packet
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build README artifact packet
        run: nix build --print-build-logs .#readme-artifact

      - name: Check README artifact packet
        run: |
          set -euo pipefail
          test -s result/README.md
          test -s result/manifest.json
          test -s result/sources.jsonl
          test -s result/receipt.json

      - name: Upload README artifact packet
        uses: actions/upload-artifact@v4
        with:
          name: ui-readme-artifact
          path: |
            result/README.md
            result/manifest.json
            result/sources.jsonl
            result/receipt.json
          if-no-files-found: error

      - name: Build Purpose Atlas preview
        run: nix build --print-build-logs -o purpose-result .#purpose-atlas-preview-html

      - name: Verify Purpose Atlas preview
        run: |
          set -euo pipefail
          mkdir -p purpose-atlas-preview-artifact
          cp -R purpose-result/dist purpose-atlas-preview-artifact/dist
          cp tests/fixtures/purpose-atlas/atlas-data.json purpose-atlas-preview-artifact/atlas-data.json
          node tests/check-purpose-atlas-upload-artifact.mjs purpose-atlas-preview-artifact

      - name: Upload Purpose Atlas preview
        uses: actions/upload-artifact@v4
        with:
          name: purpose-atlas-preview
          path: purpose-atlas-preview-artifact
          if-no-files-found: error
